name: Sync dev with master

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Force-update dev ref to master tip
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.git.updateRef({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              ref:   'heads/dev',
              sha:   context.sha,
              force: true,
            });
