name: CI - Build & Push to ECR

on:
  push:
    branches:
      - dev
      - master
      - 'ci/#' # 테스트를 위해 현재 브랜치 패턴 추가 (나중에 삭제)
  pull_request:
    branches:
      - dev
      - master

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Gradle 실행 권한 부여
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test

      # 1. OIDC 정보 확인용 로그 (나중에 삭제)
      - name: Debug OIDC Info
        run: |
          echo "Organization: ${{ github.repository_owner }}"
          echo "Repository: ${{ github.repository }}"
          echo "Current Branch: ${{ github.ref_name }}"

      - name: Docker 이미지 빌드 검증 (PR용)
        if: github.event_name == 'pull_request'
        run: docker build -t test-image .

      - name: Set Role ARN by branch
        if: github.event_name == 'push'
        run: |
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            echo "ROLE_ARN=${{ secrets.PROD_ROLE_ARN }}" >> $GITHUB_ENV
          else
            # dev 브랜치와 현재 작업 중인 ci/# 브랜치 모두 STG 권한 사용
            echo "ROLE_ARN=${{ secrets.STG_ROLE_ARN }}" >> $GITHUB_ENV
          fi

      - name: Configure AWS credentials (OIDC)
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        if: github.event_name == 'push'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker image
        if: github.event_name == 'push'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: groute-ecr
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "Pushed → $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"