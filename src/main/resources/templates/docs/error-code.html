<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error Code 목록</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 2rem;
            color: #222;
        }
        h1 {
            margin-bottom: 0.25rem;
        }
        .subtitle {
            color: #666;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            max-width: 1100px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 0.6rem 0.8rem;
            text-align: left;
            vertical-align: top;
        }
        th {
            background: #f5f5f5;
            font-weight: 600;
        }
        tr:nth-child(even) td {
            background: #fafafa;
        }
        code {
            font-family: "SFMono-Regular", Consolas, monospace;
            font-size: 0.9rem;
        }
        .status-2xx { color: #2e7d32; font-weight: 600; }
        .status-4xx { color: #ef6c00; font-weight: 600; }
        .status-5xx { color: #c62828; font-weight: 600; }
    </style>
</head>
<body>
<h1>Error Code 목록</h1>
<p class="subtitle">
    <span th:text="'총 ' + ${#arrays.length(errorCodes)} + '건'">총 0건</span>
    · 이 페이지는 <code>prod</code> 프로파일에서는 노출되지 않습니다.
</p>

<table>
    <thead>
    <tr>
        <th style="width: 20%;">Name</th>
        <th style="width: 15%;">Code</th>
        <th style="width: 15%;">HTTP Status</th>
        <th>Message</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="ec : ${errorCodes}">
        <td><code th:text="${ec.name()}">NAME</code></td>
        <td><code th:text="${ec.code}">COMMON_000</code></td>
        <td>
            <span th:classappend="${ec.httpStatus.is2xxSuccessful()} ? 'status-2xx'
                                : (${ec.httpStatus.is4xxClientError()} ? 'status-4xx'
                                : (${ec.httpStatus.is5xxServerError()} ? 'status-5xx' : ''))"
                  th:text="${ec.httpStatus.value()} + ' ' + ${ec.httpStatus.name()}">400 BAD_REQUEST</span>
        </td>
        <td th:text="${ec.message}">메시지</td>
    </tr>
    </tbody>
</table>
</body>
</html>
