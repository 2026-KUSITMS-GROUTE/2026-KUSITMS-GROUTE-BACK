# ===== 공통 설정 (모든 환경) =====
spring:
  application:
    name: groute-server

  jackson:
    time-zone: UTC

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/groute_local}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-name: Kakao
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: ${KAKAO_REDIRECT_URI}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope:
              - profile_nickname
              - account_email
          naver:
            client-name: Naver
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            redirect-uri: ${NAVER_REDIRECT_URI}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope:
              - name
              - email
              - profile_image
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-must-be-changed-in-production-env}
  expiration: ${JWT_EXPIRATION:86400000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    try-it-out-enabled: true
    operations-sorter: method
    deep-linking: true
    default-models-expand-depth: 2
    doc-expansion: list
  api-docs:
    path: /v3/api-docs
    enabled: true

app:
  swagger:
    server-url: http://localhost:8080
    server-description: Local

---
# ===== 로컬 개발 환경 =====
spring:
  config:
    activate:
      on-profile: local

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.groute: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

---
# ===== Staging 환경 =====
spring:
  config:
    activate:
      on-profile: stg

  jpa:
    show-sql: false

  flyway:
    baseline-on-migrate: false

app:
  swagger:
    server-url: https://stg.api.glit.today
    server-description: Staging

logging:
  level:
    com.groute: INFO
    root: WARN

---
# ===== Production 환경 =====
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    show-sql: false

  flyway:
    baseline-on-migrate: false

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

app:
  swagger:
    server-url: https://api.glit.today
    server-description: Production

logging:
  level:
    com.groute: WARN
    root: ERROR
