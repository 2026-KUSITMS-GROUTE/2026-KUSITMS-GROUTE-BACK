# ===== 공통 설정 (모든 환경) =====
spring:
  application:
    name: groute-server

  jackson:
    time-zone: UTC

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/groute_local}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-version: 1
    baseline-on-migrate: true
    out-of-order: true

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-name: Kakao
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8080/login/oauth2/code/kakao}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope:
              - profile_nickname
          google:
            client-name: Google
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
            authorization-grant-type: authorization_code
            scope:
              - profile
              - email
          naver:
            client-name: Naver
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            redirect-uri: ${NAVER_REDIRECT_URI:http://localhost:8080/login/oauth2/code/naver}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope:
              - nickname
              - email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

management:
  endpoints:
    web:
      exposure:
        include: health

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-must-be-changed-in-production-env}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:1209600000}

auth:
  refresh-token:
    cookie-enabled: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    try-it-out-enabled: true
    operations-sorter: method
    deep-linking: true
    default-models-expand-depth: 2
    doc-expansion: list
  api-docs:
    path: /v3/api-docs
    enabled: true

app:
  swagger:
    server-url: http://localhost:8080
    server-description: Local

discord:
  webhook:
    enabled: false
    url: ${DISCORD_WEBHOOK_URL:}

---
# ===== 로컬 개발 환경 =====
spring:
  config:
    activate:
      on-profile: local

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.groute: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

---
# ===== Staging 환경 =====
spring:
  config:
    activate:
      on-profile: stg

  jpa:
    show-sql: false

  flyway:
    baseline-on-migrate: false

app:
  swagger:
    server-url: https://stg-api.glit.today
    server-description: Staging

discord:
  webhook:
    enabled: true
    url: ${DISCORD_WEBHOOK_URL}

logging:
  level:
    com.groute: INFO
    root: WARN

---
# ===== Production 환경 =====
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    show-sql: false

  flyway:
    baseline-on-migrate: false

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

app:
  swagger:
    server-url: https://api.glit.today
    server-description: Production

auth:
  refresh-token:
    cookie-enabled: true

discord:
  webhook:
    enabled: true
    url: ${DISCORD_WEBHOOK_URL}

logging:
  level:
    com.groute: WARN
    root: ERROR
